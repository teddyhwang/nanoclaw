<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tico Investments</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/investments.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <span>Loading investment data…</span>
  </div>

  <div id="app" class="hidden">
    <!-- Top nav -->
    <header>
      <div class="header-left">
        <i data-lucide="wallet" class="logo-icon"></i>
        <nav class="top-nav">
          <a href="/" class="nav-link">Finance</a>
          <a href="/investments" class="nav-link active">Investments</a>
        </nav>
        <div class="header-mid" id="invest-header-stats"></div>
      </div>
      <div class="header-right">
        <button id="privacy-btn" class="btn-privacy" title="Toggle privacy mode"><i data-lucide="eye"></i></button>
      </div>
    </header>

    <!-- Sub-navigation -->
    <nav class="sub-nav" id="sub-nav">
      <a href="/investments" class="sub-tab" data-view="overview">Overview</a>
      <a href="/investments/salaries" class="sub-tab" data-view="salaries">Salaries</a>
      <div class="sub-sep"></div>
      <!-- Year tabs injected dynamically -->
    </nav>

    <!-- Views -->
    <div class="view-container" id="view-container"></div>
  </div>

  <script src="/investments.js"></script>
</body>
</html>
